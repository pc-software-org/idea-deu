name: build

on:
  push:
    branches: [main, "feature/**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

# Least privilege by default; the release job elevates to contents: write.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Unit tests
        run: python -m unittest discover -s tests -q

      - name: Static checks
        run: |
          python -m compileall -q scripts tests
          git diff --check

      - name: Build language pack (from committed state, no source archive)
        run: |
          python -m scripts.idea_deu generate
          python -m scripts.idea_deu package
          shasum -a 256 dist/idea-deu.zip | tee dist/idea-deu.zip.sha256

      - name: Verify deterministic rebuild
        run: |
          first=$(shasum -a 256 dist/idea-deu.zip | cut -d' ' -f1)
          python -m scripts.idea_deu generate
          python -m scripts.idea_deu package
          second=$(shasum -a 256 dist/idea-deu.zip | cut -d' ' -f1)
          echo "first=$first"; echo "second=$second"
          test "$first" = "$second"

      - name: Verify descriptor matches config
        run: |
          python - <<'PY'
          import io, json, zipfile
          cfg = json.load(open("config/product.json"))
          outer = zipfile.ZipFile("dist/idea-deu.zip")
          jar = zipfile.ZipFile(io.BytesIO(outer.read("idea-deu/lib/idea-deu.jar")))
          xml = jar.read("META-INF/plugin.xml").decode()
          assert f'since-build="{cfg["since_build"]}"' in xml, xml
          assert f'until-build="{cfg["until_build"]}"' in xml, xml
          assert f"<version>{cfg['plugin_version']}</version>" in xml, xml
          assert "<languageBundle" in xml and 'locale="de"' in xml, xml
          # Marketplace "What's new" must be present and non-empty for this version.
          assert "<change-notes><![CDATA[<ul><li>" in xml, xml
          print("descriptor OK")
          PY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: idea-deu-${{ github.sha }}
          path: |
            dist/idea-deu.zip
            dist/idea-deu.zip.sha256
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # JetBrains Marketplace numeric plugin id (32785-german-language-pack).
      MARKETPLACE_PLUGIN_ID: "32785"
      # Permanent Marketplace token; set as a repository secret to enable upload.
      MARKETPLACE_TOKEN: ${{ secrets.MARKETPLACE_TOKEN }}
      # Author-signing key material; set as repository secrets to sign the ZIP.
      SIGN_KEY: ${{ secrets.SIGN_KEY }}
      SIGN_CERT: ${{ secrets.SIGN_CERT }}
      ZIP_SIGNER_VERSION: "0.1.43"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Verify tag matches plugin version
        run: |
          # The plugin version is the single source of truth in config; the tag
          # only marks the release and must agree with it (vX -> plugin_version X).
          tag="${GITHUB_REF_NAME#v}"
          cfg="$(python -c "import json;print(json.load(open('config/product.json'))['plugin_version'])")"
          echo "tag=$tag  config.plugin_version=$cfg"
          if [ "$tag" != "$cfg" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match plugin_version $cfg in config/product.json"
            exit 1
          fi
      - name: Build
        run: |
          python -m scripts.idea_deu generate
          python -m scripts.idea_deu package
      - name: Sign plugin
        if: ${{ env.SIGN_KEY != '' && env.SIGN_CERT != '' }}
        run: |
          curl -sSL --fail -o zip-signer.jar \
            "https://github.com/JetBrains/marketplace-zip-signer/releases/download/${ZIP_SIGNER_VERSION}/marketplace-zip-signer-cli-${ZIP_SIGNER_VERSION}.jar"
          umask 077
          printf '%s' "$SIGN_KEY" > sign-key.pem
          printf '%s' "$SIGN_CERT" > sign-cert.crt
          java -jar zip-signer.jar sign \
            -in dist/idea-deu.zip \
            -out dist/idea-deu-signed.zip \
            -cert-file sign-cert.crt \
            -key-file sign-key.pem
          java -jar zip-signer.jar verify -in dist/idea-deu-signed.zip -cert sign-cert.crt
          mv dist/idea-deu-signed.zip dist/idea-deu.zip
          rm -f sign-key.pem sign-cert.crt zip-signer.jar
          echo "::notice::plugin ZIP signed with the author certificate."
      - name: Note if signing was skipped
        if: ${{ env.SIGN_KEY == '' || env.SIGN_CERT == '' }}
        run: echo "::notice::SIGN_KEY/SIGN_CERT not set — shipping the unsigned ZIP (Marketplace still signs on distribution)."
      - name: Checksum
        run: shasum -a 256 dist/idea-deu.zip | tee dist/idea-deu.zip.sha256
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/idea-deu.zip dist/idea-deu.zip.sha256 \
            --generate-notes --title "$GITHUB_REF_NAME"
      - name: Publish to JetBrains Marketplace
        if: ${{ env.MARKETPLACE_TOKEN != '' }}
        run: |
          curl -sS --fail-with-body -X POST \
            --header "Authorization: Bearer $MARKETPLACE_TOKEN" \
            -F pluginId="$MARKETPLACE_PLUGIN_ID" \
            -F file=@dist/idea-deu.zip \
            -F channel=stable \
            https://plugins.jetbrains.com/api/updates/upload
      - name: Note if Marketplace upload was skipped
        if: ${{ env.MARKETPLACE_TOKEN == '' }}
        run: echo "::notice::MARKETPLACE_TOKEN secret not set — skipped Marketplace upload."
